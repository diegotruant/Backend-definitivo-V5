[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[project]
name = "ddtraining-digital-twin"
version = "5.0.0"
description = "Stateless analytics backend for endurance sports — metabolic profiling, HRV, training load, session classification, longitudinal tracking."
readme = "README.md"
requires-python = ">=3.10"
license = { text = "Proprietary" }
dependencies = [
    "numpy>=1.24",
    "scipy>=1.10",
    "fitparse>=1.2",
]

[project.optional-dependencies]
pdf = ["pypdf>=3.0"]
dev = [
    "black>=24.0",
    "mypy>=1.10",
    "pre-commit>=3.7",
    "pypdf>=3.0",
    "pytest>=7.0",
    "ruff>=0.5",
]

[project.scripts]
run-in-person-test = "run_in_person_test:main"
verify-package-integrity = "verify_package_integrity:main"

[tool.setuptools]
py-modules = [
    "analysis",
    "athlete_context",
    "audit",
    "bayesian_profiler",
    "cardiac_engine",
    "chart_builder",
    "coggan_classifier",
    "cross_validation_engine",
    "data_quality_engine",
    "detraining_engine",
    "durability_engine",
    "efforts_analyzer",
    "explainability_engine",
    "fit_parser",
    "hrv_engine",
    "interval_detector",
    "lab_data",
    "lactate_validation_engine",
    "test_protocols",
    "metabolic_current",
    "metabolic_flexibility_engine",
    "metabolic_kalman",
    "metabolic_profiler",
    "metabolic_profiler_phenotype",
    "metric_contracts",
    "mmp_aggregator",
    "mmp_quality",
    "neural_ode",
    "pedaling_balance",
    "power_engine",
    "race_prediction_engine",
    "thermal_engine",
    "tiers",
    "training_variability_engine",
    "w_prime_balance_engine",
    "workout_summary",
    "zones_engine",
]

[tool.setuptools.packages.find]
include = ["engines*"]

[tool.pytest.ini_options]
testpaths = ["tests", "."]
python_files = ["pytest_*.py"]
python_functions = ["test_*"]

[tool.black]
line-length = 100
target-version = ["py310"]

[tool.ruff]
line-length = 100
target-version = "py310"
exclude = [
    "frontend",
    "reports",
]

[tool.ruff.lint]
select = ["E", "F"]
ignore = ["E501"]

[tool.mypy]
python_version = "3.10"
ignore_missing_imports = true
follow_imports = "skip"
files = ["tests/pytest_smoke.py"]

explicit_package_bases = true
