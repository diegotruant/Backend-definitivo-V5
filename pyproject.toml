[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[project]
name = "ddtraining-digital-twin"
version = "5.0.0"
description = "Stateless analytics backend for endurance sports — metabolic profiling, HRV, training load, session classification, longitudinal tracking."
readme = "README.md"
requires-python = ">=3.10"
license = {text = "Proprietary"}
dependencies = [
    "numpy>=1.24",
    "scipy>=1.10",
    "fitparse>=0.6",
]

[project.optional-dependencies]
pdf = ["pypdf>=3.0"]
dev = [
    "pytest>=7.0",
    "pypdf>=3.0",
]

[tool.setuptools]
py-modules = [
    "analysis",
    "athlete_context",
    "audit",
    "bayesian_profiler",
    "cardiac_engine",
    "chart_builder",
    "coggan_classifier",
    "data_quality_engine",
    "detraining_engine",
    "durability_engine",
    "efforts_analyzer",
    "explainability_engine",
    "fit_parser",
    "hrv_engine",
    "interval_detector",
    "lab_data",
    "metabolic_current",
    "metabolic_flexibility_engine",
    "metabolic_kalman",
    "metabolic_profiler",
    "metabolic_profiler_phenotype",
    "metric_contracts",
    "mmp_quality",
    "neural_ode",
    "pedaling_balance",
    "power_engine",
    "race_prediction_engine",
    "thermal_engine",
    "tiers",
    "training_variability_engine",
    "w_prime_balance_engine",
    "workout_summary",
    "zones_engine",
]

[tool.setuptools.packages.find]
include = ["engines*"]

[tool.pytest.ini_options]
testpaths = ["."]
python_files = ["pytest_*.py"]
python_functions = ["test_*"]
