[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.backends._legacy:_Backend"

[project]
name = "ddtraining-digital-twin"
version = "5.0.0"
description = "Stateless analytics backend for endurance sports — metabolic profiling, HRV, training load, session classification, longitudinal tracking."
readme = "README.md"
requires-python = ">=3.10"
license = {text = "Proprietary"}
dependencies = [
    "numpy>=1.24",
    "scipy>=1.10",
    "fitparse>=0.6",
]

[project.optional-dependencies]
pdf = ["pypdf>=3.0"]
dev = [
    "pytest>=7.0",
    "pypdf>=3.0",
]

[tool.setuptools.packages.find]
include = ["engines*"]

[tool.pytest.ini_options]
testpaths = ["."]
python_files = ["test_*.py"]
python_functions = ["test_*"]
