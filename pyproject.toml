[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[project]
name = "ddtraining-digital-twin"
version = "5.0.0"
description = "Stateless analytics backend for endurance sports — metabolic profiling, HRV, training load, session classification, longitudinal tracking."
readme = "README.md"
requires-python = ">=3.10"
license = { text = "Proprietary" }
dependencies = [
    "numpy>=1.24",
    "scipy>=1.10",
    "fitparse>=1.2",
]

[project.optional-dependencies]
pdf = ["pypdf>=3.0"]
dev = [
    "black>=24.0",
    "fastapi>=0.110",
    "httpx>=0.27",
    "mypy>=1.10",
    "pre-commit>=3.7",
    "pypdf>=3.0",
    "pytest>=7.0",
    "python-multipart>=0.0.9",
    "ruff>=0.5",
    "uvicorn>=0.27",
]

[project.scripts]
run-in-person-test = "run_in_person_test:main"
verify-package-integrity = "verify_package_integrity:main"

[tool.setuptools.packages.find]
include = ["engines*"]

[tool.pytest.ini_options]
# pytest collects only pytest_*.py files (currently tests/pytest_smoke.py).
# The 20+ test_*.py scripts in the root are a separate legacy integration suite
# designed to be run directly with Python (e.g. `python test_e2e.py`) or via
# pytest_script_suite.py.  They are intentionally NOT collected by pytest to
# keep CI fast and deterministic.  Run the full suite with:
#   python pytest_script_suite.py
testpaths = ["tests", "."]
python_files = ["pytest_*.py"]
python_functions = ["test_*"]

[tool.black]
line-length = 100
target-version = ["py310"]

[tool.ruff]
line-length = 100
target-version = "py310"
exclude = [
    "frontend",
    "reports",
]

[tool.ruff.lint]
select = ["E", "F"]
ignore = ["E501"]

[tool.mypy]
python_version = "3.10"
ignore_missing_imports = true
follow_imports = "skip"
files = ["tests/pytest_smoke.py"]

explicit_package_bases = true
