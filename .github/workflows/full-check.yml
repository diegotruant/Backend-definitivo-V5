name: Full backend check

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    # Weekly release gate — Sunday 03:00 UTC
    - cron: "0 3 * * 0"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  full-check:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Engine lockdown diagnostic log
        shell: bash
        run: |
          mkdir -p reports/ci
          set +e
          python -m pytest -q tests/pytest_engine_lockdown_v1.py --tb=short | tee reports/ci/engine_lockdown_pytest.log
          status=${PIPESTATUS[0]}
          echo "${status}" > reports/ci/engine_lockdown_pytest.exitcode
          exit 0

      - name: Upload engine lockdown diagnostic log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: engine-lockdown-pytest-log
          path: reports/ci/engine_lockdown_pytest.*
          if-no-files-found: warn

      - name: Release gate (lint + typecheck + test-all + hardening + matrix + perfection + coverage)
        shell: bash
        run: |
          mkdir -p reports/ci
          set +e
          make check 2>&1 | tee reports/ci/release_gate.log
          status=${PIPESTATUS[0]}
          echo "${status}" > reports/ci/release_gate.exitcode
          exit "${status}"

      - name: Upload release gate log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-gate-log
          path: reports/ci/release_gate.*
          if-no-files-found: warn
