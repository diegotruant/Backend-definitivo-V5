name: Apply typed FIT phase8 test migration

on:
  push:
    branches:
      - refactor/typed-fit-decoder-boundary
    paths:
      - tools/apply_fit_phase8_typed_boundary_test.py
      - .github/workflows/apply-fit-phase8-typed-boundary-test.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: refactor/typed-fit-decoder-boundary
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Apply reviewed test migration
        run: python tools/apply_fit_phase8_typed_boundary_test.py

      - name: Validate updated test
        run: |
          python -m py_compile tests/pytest_phase8_coverage_100.py
          git diff --check

      - name: Remove one-shot tooling
        run: |
          rm tools/apply_fit_phase8_typed_boundary_test.py
          rm .github/workflows/apply-fit-phase8-typed-boundary-test.yml

      - name: Commit updated expectation
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "test: expect typed FIT decoder CRC errors"
          git push origin HEAD:refactor/typed-fit-decoder-boundary
