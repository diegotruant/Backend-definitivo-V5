name: One-shot OpenAPI TypeScript codegen

on:
  push:
    branches:
      - chore/openapi-consistency-gate
    paths:
      - .github/workflows/openapi-codegen-once.yml

permissions:
  contents: write

jobs:
  regenerate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: chore/openapi-consistency-gate

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Regenerate OpenAPI TypeScript schema
        working-directory: frontend
        run: npm run codegen:api

      - name: Commit generated schema
        shell: bash
        run: |
          if git diff --quiet -- frontend/src/api/generated/schema.ts; then
            echo "Generated schema already up to date."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add frontend/src/api/generated/schema.ts
          git commit -m "chore: regenerate OpenAPI TypeScript schema"
          git push origin HEAD:chore/openapi-consistency-gate
