name: CI

on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: read

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Lint
        run: make lint

      - name: Full pytest suite (unit + integration scripts + golden)
        shell: bash
        run: |
          mkdir -p reports/ci
          set +e
          make test-all 2>&1 | tee reports/ci/test_all.log
          status=${PIPESTATUS[0]}
          echo "${status}" > reports/ci/test_all.exitcode
          exit "${status}"

      - name: Upload full pytest log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-all-log
          path: reports/ci/test_all.*
          if-no-files-found: warn
