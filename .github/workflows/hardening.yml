name: Hardening tests

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  hardening:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Run hardening tests
        run: make hardening-test

      - name: Run stress subset
        run: make stress-test
