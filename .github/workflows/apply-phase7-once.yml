name: Apply phase 7 once

on:
  push:
    branches:
      - integration/zero-power-average-phase-7
    paths:
      - .automation/phase7.patch
      - .github/workflows/apply-phase7-once.yml

permissions:
  contents: write

jobs:
  apply-phase7:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout phase 7 branch
        uses: actions/checkout@v4
        with:
          ref: integration/zero-power-average-phase-7
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Apply validated phase 7 patch
        run: |
          git apply --check .automation/phase7.patch
          git apply .automation/phase7.patch

      - name: Install test dependencies
        run: python -m pip install -e '.[dev]'

      - name: Run phase 7 regression tests
        run: |
          python -m pytest -q \
            tests/pytest_zero_power_average_semantics.py \
            tests/pytest_activity_parser_charts.py \
            tests/pytest_phase5_coverage_92_b.py \
            tests/pytest_phase5_coverage_completion.py \
            tests/pytest_phase5_coverage_gate.py \
            tests/pytest_phase6_coverage_medium.py

      - name: Commit phase 7 and remove one-shot automation
        run: |
          rm -f .automation/phase7.patch .github/workflows/apply-phase7-once.yml
          rmdir .automation 2>/dev/null || true
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'fix: preserve zero-power samples and explicit average semantics'
          git push origin HEAD:integration/zero-power-average-phase-7
