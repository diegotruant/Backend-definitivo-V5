name: Apply phase 7 CI fix once

on:
  push:
    branches:
      - integration/zero-power-average-phase-7
    paths:
      - .automation/phase7-ci-fix.patch
      - .github/workflows/apply-phase7-ci-fix-once.yml

permissions:
  contents: write

jobs:
  apply-fix:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout phase 7 branch
        uses: actions/checkout@v4
        with:
          ref: integration/zero-power-average-phase-7
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Apply compatibility fix
        run: |
          git apply --check .automation/phase7-ci-fix.patch
          git apply .automation/phase7-ci-fix.patch

      - name: Install test dependencies
        run: python -m pip install -e '.[dev]'

      - name: Run affected regressions
        run: |
          python -m pytest -q \
            tests/pytest_phase4_coverage_depth.py::TestDataQualityEngine::test_assess_detects_low_quality_power \
            tests/pytest_phase4_coverage_depth.py::TestMmpAggregatorBatch7::test_quality_gate_rejects_dirty_ride \
            tests/pytest_phase5_coverage_92_m.py::TestFinalClosure92N::test_mmp_aggregator_edge_paths \
            tests/pytest_zero_power_average_semantics.py

      - name: Commit fix and remove one-shot automation
        run: |
          rm -f .automation/phase7-ci-fix.patch .github/workflows/apply-phase7-ci-fix-once.yml
          rmdir .automation 2>/dev/null || true
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'test: align legacy quality gates with zero-power semantics'
          git push origin HEAD:integration/zero-power-average-phase-7
